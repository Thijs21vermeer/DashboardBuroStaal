[build]
  command = "BUILD_TARGET=netlify npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Functions configuratie voor serverless
[functions]
  node_bundler = "esbuild"
  included_files = ["dist/**"]

# Environment variables die nodig zijn (stel deze in via Netlify dashboard)
# AZURE_SQL_SERVER
# AZURE_SQL_DATABASE
# AZURE_SQL_USER
# AZURE_SQL_PASSWORD
# AZURE_SQL_PORT

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/___netlify-handler"
  status = 200
  force = false
