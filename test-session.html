<!DOCTYPE html>
<html>
<head>
    <title>Session Test</title>
</head>
<body>
    <h1>Session Test</h1>
    <div id="result"></div>
    
    <script>
        async function checkSession() {
            const result = document.getElementById('result');
            
            try {
                // Check if logged in
                const response = await fetch('https://burostaaldashboard.netlify.app/api/auth/validate', {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                result.innerHTML = `
                    <h2>Status: ${response.status}</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <p>You are ${data.valid ? 'LOGGED IN' : 'NOT LOGGED IN'}</p>
                `;
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        checkSession();
    </script>
</body>
</html>
