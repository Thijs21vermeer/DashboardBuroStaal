<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth System</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        button {
            background: #7f56d9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background: #6941c6;
        }
        input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-right: 10px;
            width: 200px;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        .token-display {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Auth System Test</h1>
        
        <div class="test-section">
            <h2>1️⃣ Login met wachtwoord</h2>
            <p>Test of je een token krijgt met het juiste wachtwoord</p>
            <input type="password" id="password" placeholder="Wachtwoord" value="BurostaalDB">
            <button onclick="testLogin()">Login</button>
            <div id="login-result"></div>
        </div>

        <div class="test-section">
            <h2>2️⃣ Verificeer token</h2>
            <p>Test of je token geldig is</p>
            <button onclick="testVerify()">Verificeer Token</button>
            <button onclick="testVerifyInvalid()">Test Invalid Token</button>
            <div id="verify-result"></div>
        </div>

        <div class="test-section">
            <h2>3️⃣ Test zonder token</h2>
            <p>Test wat er gebeurt zonder Authorization header</p>
            <button onclick="testNoToken()">Test Zonder Token</button>
            <div id="notoken-result"></div>
        </div>

        <div class="test-section">
            <h2>4️⃣ Health Check</h2>
            <p>Bekijk info over het auth endpoint</p>
            <button onclick="testHealthCheck()">Health Check</button>
            <div id="health-result"></div>
        </div>
    </div>

    <script>
        let currentToken = null;

        async function testLogin() {
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('login-result');
            
            resultDiv.innerHTML = '<div class="result info">Bezig met inloggen...</div>';
            
            try {
                const response = await fetch('/api/auth/login-v2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentToken = data.token;
                    resultDiv.innerHTML = `
                        <div class="result success">
                            ✅ Login succesvol!
                            
Status: ${response.status}
Expires in: ${data.expiresIn} seconden (${data.expiresIn / 3600} uur)
                        </div>
                        <div class="token-display">
                            <strong>Token:</strong><br>${data.token}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            ❌ Login gefaald
                            
Status: ${response.status}
Message: ${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }

        async function testVerify() {
            const resultDiv = document.getElementById('verify-result');
            
            if (!currentToken) {
                resultDiv.innerHTML = '<div class="result error">❌ Eerst inloggen om een token te krijgen!</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="result info">Bezig met verificatie...</div>';
            
            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            ✅ Token is geldig!
                            
Status: ${response.status}
Message: ${data.message}
Active sessions: ${data.activeSessions}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            ❌ Token ongeldig
                            
Status: ${response.status}
Message: ${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }

        async function testVerifyInvalid() {
            const resultDiv = document.getElementById('verify-result');
            resultDiv.innerHTML = '<div class="result info">Test met fake token...</div>';
            
            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer fake-invalid-token-123'
                    }
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result ${data.success ? 'error' : 'success'}">
                        ${data.success ? '❌ PROBLEEM: Fake token werd geaccepteerd!' : '✅ Correct: Fake token werd geweigerd'}
                        
Status: ${response.status}
Message: ${data.message}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }

        async function testNoToken() {
            const resultDiv = document.getElementById('notoken-result');
            resultDiv.innerHTML = '<div class="result info">Test zonder token...</div>';
            
            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result ${response.status === 401 ? 'success' : 'error'}">
                        ${response.status === 401 ? '✅ Correct: Unauthorized zonder token' : '❌ PROBLEEM: Request zonder token geaccepteerd!'}
                        
Status: ${response.status}
Message: ${data.message}
${data.hint ? 'Hint: ' + data.hint : ''}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }

        async function testHealthCheck() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.innerHTML = '<div class="result info">Health check...</div>';
            
            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'GET',
                    headers: currentToken ? {
                        'Authorization': `Bearer ${currentToken}`
                    } : {}
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result info">
                        📊 Health Check Info
                        
${JSON.stringify(data, null, 2)}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
