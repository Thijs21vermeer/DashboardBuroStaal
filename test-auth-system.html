<!DOCTYPE html>
<html>
<head>
    <title>Auth System Test</title>
</head>
<body>
    <h1>Complete Auth & API Test</h1>
    
    <h2>1. Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <div id="loginResult"></div>
    
    <h2>2. Validate Session</h2>
    <button onclick="validateSession()">Check Session</button>
    <div id="validateResult"></div>
    
    <h2>3. Test Tools API</h2>
    <button onclick="testTools()">Get Tools</button>
    <div id="toolsResult"></div>
    
    <script>
        const BASE_URL = 'https://burostaaldashboard.netlify.app';
        
        async function login() {
            const password = document.getElementById('password').value;
            const result = document.getElementById('loginResult');
            
            try {
                const response = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function validateSession() {
            const result = document.getElementById('validateResult');
            
            try {
                const response = await fetch(`${BASE_URL}/api/auth/validate`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function testTools() {
            const result = document.getElementById('toolsResult');
            
            try {
                const response = await fetch(`${BASE_URL}/api/tools`, {
                    credentials: 'include'
                });
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = text;
                }
                
                result.innerHTML = `
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
